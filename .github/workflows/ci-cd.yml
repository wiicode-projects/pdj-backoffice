name: PLAT DU JOUR - BACKOFFICE - CI/CD
on:
  push:
    branches: [ main, dev, infra/devops ]

  pull_request:
    branches: [ main, dev ]

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pdj-backoffice-dev
  


jobs:
  
  # ==========================================================================
  # JOB 1 — BIULD & PUSH  uniquement sur dev et main (merge depuis infra/devops)
  # ==========================================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate short SHA
        id: vars
        run: echo "SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.SHA_SHORT }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

  # ===================================================================
  # JOB 3 — DEPLOY STAGING
  # Uniquement sur dev (merge depuis infra/devops) et pus direct sur dev
  # =====================================================================    

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "docker/docker-compose.staging.yml"
          target: "${{ vars.DEPLOY_PATH }}"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            cd ${{ vars.DEPLOY_PATH }}
            mv docker-compose.staging.yml docker-compose.yml
            IMAGE_TAG=${{ steps.vars.outputs.SHA_SHORT }} \
            docker compose up -d --pull always pdj_backoffice
            docker image prune -f

  # ============================================================
  # JOB 3 — DEPLOY PROD
  # Uniquement sur main (merge depuis dev)
  # ============================================================

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get short SHA
        id: vars
        run: echo "SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Copy compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "docker/docker-compose.production.yml"
          target: ${{ vars.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            cd ${{ vars.DEPLOY_PATH }}
  
            mv docker-compose.production.yml docker-compose.yml

            IMAGE_TAG=${{ steps.vars.outputs.SHA_SHORT }} \
            docker compose up -d --pull always pdj_backoffice

            docker image prune -f
