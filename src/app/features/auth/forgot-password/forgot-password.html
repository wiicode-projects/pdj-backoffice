<div class="reset-page">
  <!-- Language switcher -->
  <div class="reset-page__lang">
    <pdj-language-switcher />
  </div>

  <div class="reset-page__container">
    <!-- Logo -->
    <div class="reset-page__logo">
      <img src="/images/login-logo.png" alt="Le Plat du Jour" class="reset-page__logo-img" />
    </div>

    <!-- Card -->
    <div class="reset-page__card">
      <h1 class="reset-page__title">{{ 'AUTH.RESET_TITLE' | translate }}</h1>
      <p class="reset-page__subtitle">{{ 'AUTH.RESET_SUBTITLE' | translate }}</p>

      <!-- Success message -->
      @if (successMessage()) {
        <div class="reset-page__success">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 8L7 10L11 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>{{ successMessage() | translate }}</span>
        </div>
      }

      <!-- Error message -->
      @if (errorMessage()) {
        <div class="reset-page__error">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 4.5V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="8" cy="11.5" r="0.75" fill="currentColor"/>
          </svg>
          <span>{{ errorMessage() | translate }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="reset-page__form">
        <!-- Email field -->
        <div class="reset-page__field">
          <label class="reset-page__label" for="reset-email">{{ 'AUTH.EMAIL_LABEL' | translate }}</label>
          <div class="reset-page__input-wrapper">
            <svg class="reset-page__input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M2 6L10 11L18 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input
              id="reset-email"
              type="email"
              class="reset-page__input"
              [(ngModel)]="email"
              name="email"
              [placeholder]="'AUTH.EMAIL_PLACEHOLDER' | translate"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <!-- Submit button -->
        <button
          type="submit"
          class="reset-page__submit"
          [disabled]="isSubmitting()"
        >
          @if (isSubmitting()) {
            <span class="reset-page__spinner"></span>
          }
          <span>{{ 'AUTH.SEND_RESET_LINK' | translate }}</span>
        </button>
      </form>

      <!-- Back to login -->
      <a routerLink="/login" class="reset-page__back-link">
        {{ 'AUTH.BACK_TO_LOGIN' | translate }}
      </a>
    </div>
  </div>
</div>
