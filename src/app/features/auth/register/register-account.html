<div class="login-page register-page">
  <div class="login-page__lang">
    <pdj-language-switcher />
  </div>

  <div class="login-page__container">
    <div class="login-page__logo">
      <img src="/images/login-logo.png" alt="Le Plat du Jour" class="login-page__logo-img" />
    </div>

    <div class="login-page__card">
      <p class="register-page__step">{{ 'AUTH.SIGNUP_STEP_2' | translate }}</p>
      <h1 class="login-page__title">{{ 'AUTH.SIGNUP_ACCOUNT_TITLE' | translate }}</h1>
      <p class="login-page__subtitle">{{ 'AUTH.SIGNUP_ACCOUNT_SUBTITLE' | translate }}</p>

      @if (errorMessage()) {
        <div class="login-page__error">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 4.5V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="8" cy="11.5" r="0.75" fill="currentColor"/>
          </svg>
          <span>{{ errorMessage() | translate }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="login-page__form">
        <div class="register-page__row">
          <div class="login-page__field">
            <label class="login-page__label" for="firstName">{{ 'AUTH.SIGNUP_FIRST_NAME' | translate }}</label>
            <div class="login-page__input-wrapper">
              <input
                id="firstName"
                type="text"
                class="login-page__input login-page__input--plain"
                [(ngModel)]="firstName"
                name="firstName"
                [placeholder]="'AUTH.SIGNUP_FIRST_NAME_PLACEHOLDER' | translate"
                required
              />
            </div>
          </div>
          <div class="login-page__field">
            <label class="login-page__label" for="lastName">{{ 'AUTH.SIGNUP_LAST_NAME' | translate }}</label>
            <div class="login-page__input-wrapper">
              <input
                id="lastName"
                type="text"
                class="login-page__input login-page__input--plain"
                [(ngModel)]="lastName"
                name="lastName"
                [placeholder]="'AUTH.SIGNUP_LAST_NAME_PLACEHOLDER' | translate"
                required
              />
            </div>
          </div>
        </div>

        <div class="login-page__field">
          <label class="login-page__label" for="signup-email">{{ 'AUTH.EMAIL_LABEL' | translate }}</label>
          <div class="login-page__input-wrapper">
            <svg class="login-page__input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M2 6L10 11L18 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input
              id="signup-email"
              type="email"
              class="login-page__input"
              [(ngModel)]="email"
              name="email"
              [placeholder]="'AUTH.EMAIL_PLACEHOLDER' | translate"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="login-page__field">
          <label class="login-page__label" for="phone">{{ 'AUTH.SIGNUP_PHONE' | translate }}</label>
          <pdj-phone-input
            inputId="phone"
            [(ngModel)]="phone"
            name="phone"
            [placeholder]="'AUTH.SIGNUP_PHONE_PLACEHOLDER' | translate"
            [hasError]="!!errorMessage()"
          />
        </div>

        <div class="login-page__field">
          <label class="login-page__label" for="signup-password">{{ 'AUTH.PASSWORD' | translate }}</label>
          <div class="login-page__input-wrapper">
            <svg class="login-page__input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="4" y="8" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 8V5C7 3.34 8.34 2 10 2C11.66 2 13 3.34 13 5V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="10" cy="13" r="1.5" fill="currentColor"/>
            </svg>
            <input
              id="signup-password"
              [type]="showPassword() ? 'text' : 'password'"
              class="login-page__input"
              [(ngModel)]="password"
              name="password"
              [placeholder]="'AUTH.NEW_PASSWORD_PLACEHOLDER' | translate"
              autocomplete="new-password"
              required
            />
            <button type="button" class="login-page__toggle-password" (click)="togglePassword()" [attr.aria-label]="'AUTH.TOGGLE_PASSWORD' | translate">
              @if (showPassword()) {
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <path d="M2.5 10C2.5 10 5 4.5 10 4.5C15 4.5 17.5 10 17.5 10C17.5 10 15 15.5 10 15.5C5 15.5 2.5 10 2.5 10Z" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="3" y1="17" x2="17" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              } @else {
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <path d="M2.5 10C2.5 10 5 4.5 10 4.5C15 4.5 17.5 10 17.5 10C17.5 10 15 15.5 10 15.5C5 15.5 2.5 10 2.5 10Z" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="login-page__field">
          <label class="login-page__label" for="signup-password-confirm">{{ 'AUTH.CONFIRM_PASSWORD' | translate }}</label>
          <div class="login-page__input-wrapper">
            <svg class="login-page__input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="4" y="8" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 8V5C7 3.34 8.34 2 10 2C11.66 2 13 3.34 13 5V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="10" cy="13" r="1.5" fill="currentColor"/>
            </svg>
            <input
              id="signup-password-confirm"
              [type]="showPasswordConfirm() ? 'text' : 'password'"
              class="login-page__input"
              [(ngModel)]="password1"
              name="password1"
              [placeholder]="'AUTH.CONFIRM_PASSWORD_PLACEHOLDER' | translate"
              autocomplete="new-password"
              required
            />
            <button type="button" class="login-page__toggle-password" (click)="togglePasswordConfirm()" [attr.aria-label]="'AUTH.TOGGLE_PASSWORD' | translate">
              @if (showPasswordConfirm()) {
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <path d="M2.5 10C2.5 10 5 4.5 10 4.5C15 4.5 17.5 10 17.5 10C17.5 10 15 15.5 10 15.5C5 15.5 2.5 10 2.5 10Z" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="3" y1="17" x2="17" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              } @else {
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <path d="M2.5 10C2.5 10 5 4.5 10 4.5C15 4.5 17.5 10 17.5 10C17.5 10 15 15.5 10 15.5C5 15.5 2.5 10 2.5 10Z" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <label class="login-page__checkbox-label register-page__terms">
          <input type="checkbox" [(ngModel)]="acceptTerms" name="acceptTerms" class="login-page__checkbox" />
          <span class="login-page__checkbox-custom"></span>
          <span>
            {{ 'AUTH.SIGNUP_TERMS_PREFIX' | translate }}
            <a [href]="legalUrls.cgu" target="_blank" rel="noopener noreferrer" class="register-page__legal-link" (click)="$event.stopPropagation()">CGU</a>,
            <a [href]="legalUrls.cgv" target="_blank" rel="noopener noreferrer" class="register-page__legal-link" (click)="$event.stopPropagation()">CGV</a>
            {{ 'AUTH.SIGNUP_TERMS_AND' | translate }}
            <a [href]="legalUrls.privacy" target="_blank" rel="noopener noreferrer" class="register-page__legal-link" (click)="$event.stopPropagation()">{{ 'AUTH.SIGNUP_TERMS_PRIVACY' | translate }}</a>
          </span>
        </label>

        <button type="submit" class="login-page__submit" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <span class="login-page__spinner"></span>
          }
          <span>{{ 'AUTH.SIGNUP_CREATE_ACCOUNT' | translate }}</span>
        </button>
      </form>

      <a routerLink="/register" class="register-page__back-link">{{ 'AUTH.SIGNUP_BACK_RESTAURANT' | translate }}</a>
    </div>
  </div>
</div>
